services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_BRIDGE_PORT: ${OPENCLAW_BRIDGE_PORT:-18790}
      OPENCLAW_CONFIG_DIR: ${OPENCLAW_CONFIG_DIR:-./data/chunny_1}
      OPENCLAW_WORKSPACE_DIR: ${OPENCLAW_WORKSPACE_DIR:-./data/chunny_1/workspace}
      CLAUDE_CONFIG_DIR: ${CLAUDE_CONFIG_DIR:-./data/chunny_1/.claude}
      CLAUDE_JSON_DIR: ${CLAUDE_JSON_DIR:-./data/chunny_1/.claude.json}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-ws://localhost:18789}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      NOTION_API_TOKEN: ${NOTION_API_TOKEN:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      SUPABASE_PROJECT_URL: ${SUPABASE_PROJECT_URL:-}
      SUPABASE_PROJECT_API: ${SUPABASE_PROJECT_API:-}
      SUPABASE_CONNECTION_STRING_IPV4: ${SUPABASE_CONNECTION_STRING_IPV4:-}
      DISCORD_USER_ID: ${DISCORD_USER_ID:-}
      DISCORD_BOT_PERMISSIONS: ${DISCORD_BOT_PERMISSIONS:-}
      DISCORD_MORNING_CHANNEL_ID: ${DISCORD_MORNING_CHANNEL_ID:-}
      DISCORD_RAIN_ALERT_CHANNEL_ID: ${DISCORD_RAIN_ALERT_CHANNEL_ID:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      DISCORD_CHANNEL_ID_MUSIC: ${DISCORD_CHANNEL_ID_MUSIC:-}
      DISCORD_CHANNEL_ID_SHOPEE: ${DISCORD_CHANNEL_ID_SHOPEE:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_USER_PI_PRAO: ${LINE_USER_PI_PRAO:-}
      LINE_USER_CHUNNY: ${LINE_USER_CHUNNY:-}
    volumes:
      - ./data/chunny_1:/home/node/.openclaw
      - ./data/chunny_1/workspace:/home/node/.openclaw/workspace
      - ./typhoon:/typhoon
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "8000:8000"
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_BRIDGE_PORT: ${OPENCLAW_BRIDGE_PORT:-18790}
      OPENCLAW_CONFIG_DIR: ${OPENCLAW_CONFIG_DIR:-./data/chunny_1}
      OPENCLAW_WORKSPACE_DIR: ${OPENCLAW_WORKSPACE_DIR:-./data/chunny_1/workspace}
      CLAUDE_CONFIG_DIR: ${CLAUDE_CONFIG_DIR:-./data/chunny_1/.claude}
      CLAUDE_JSON_DIR: ${CLAUDE_JSON_DIR:-./data/chunny_1/.claude.json}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-ws://localhost:18789}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      NOTION_API_TOKEN: ${NOTION_API_TOKEN:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      SUPABASE_PROJECT_URL: ${SUPABASE_PROJECT_URL:-}
      SUPABASE_PROJECT_API: ${SUPABASE_PROJECT_API:-}
      SUPABASE_CONNECTION_STRING_IPV4: ${SUPABASE_CONNECTION_STRING_IPV4:-}
      DISCORD_USER_ID: ${DISCORD_USER_ID:-}
      DISCORD_BOT_PERMISSIONS: ${DISCORD_BOT_PERMISSIONS:-}
      DISCORD_MORNING_CHANNEL_ID: ${DISCORD_MORNING_CHANNEL_ID:-}
      DISCORD_RAIN_ALERT_CHANNEL_ID: ${DISCORD_RAIN_ALERT_CHANNEL_ID:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      DISCORD_CHANNEL_ID_MUSIC: ${DISCORD_CHANNEL_ID_MUSIC:-}
      DISCORD_CHANNEL_ID_SHOPEE: ${DISCORD_CHANNEL_ID_SHOPEE:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_USER_PI_PRAO: ${LINE_USER_PI_PRAO:-}
      LINE_USER_CHUNNY: ${LINE_USER_CHUNNY:-}
    volumes:
      - ./data/chunny_1:/home/node/.openclaw
      - ./data/chunny_1/workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
